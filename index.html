<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construction AI Intelligence Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        :root {
            --primary-navy: #1a237e;
            --accent-blue: #3949ab;
            --success-green: #2e7d32;
            --warning-orange: #f57c00;
            --danger-red: #c62828;
            --bg-light: #f1f5f9;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg-light); color: #1e293b; }
        .header-banner { width: 100%; display: block; }

        .main-container {
            max-width: 1100px;
            margin: -60px auto 60px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
        }

        .section-title { font-size: 1.1rem; font-weight: 700; color: var(--primary-navy); margin-bottom: 15px; display: flex; align-items: center; }
        .section-title::before { content: ''; width: 4px; height: 18px; background: var(--accent-blue); margin-right: 10px; border-radius: 2px; }

        /* 챗봇 스타일 */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 500px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #edf2f7;
            border-radius: 12px;
            padding: 15px;
            background: #f8fafc;
            margin-bottom: 15px;
        }
        .message { margin-bottom: 10px; padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; max-width: 85%; }
        .bot { background: var(--primary-navy); color: white; align-self: flex-start; }
        .user { background: #e2e8f0; color: #1e293b; align-self: flex-end; margin-left: auto; }

        .chat-input-group { display: flex; gap: 8px; }
        .chat-input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; }
        .btn-send { background: var(--accent-blue); color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; }

        /* 날씨 및 데이터 레이아웃 */
        .weather-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .weather-card { background: #f8fafc; padding: 10px; border-radius: 10px; text-align: center; font-size: 0.85rem; }
        .weather-val { font-weight: 700; color: var(--accent-blue); display: block; }

        .metric-table { width: 100%; border-collapse: collapse; }
        .metric-table td { padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }

        @media (max-width: 950px) {
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<img src="https://capsule-render.vercel.app/api?type=waving&color=1a237e&height=250&section=header&text=Construction%20AI%20Intelligence&fontSize=40&fontColor=ffffff" class="header-banner">

<div class="main-container">
    <div class="left-content">
        <div class="card">
            <div class="section-title">Live Field Environment (Seoul)</div>
            <div class="weather-info">
                <div class="weather-card">Temp<span id="temp" class="weather-val">--°C</span></div>
                <div class="weather-card">Cond<span id="cond" class="weather-val">..</span></div>
                <div class="weather-card">Work<span id="work" class="weather-val">..</span></div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">Performance Analysis</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px;">
                <div>
                    <label style="font-size:0.8rem; font-weight:600;">Schedule Data (CSV)</label>
                    <input type="file" id="csvFile" style="width:100%; margin-top:5px;">
                </div>
                <div>
                    <label style="font-size:0.8rem; font-weight:600;">Budget (BAC)</label>
                    <input type="number" id="bac" value="100" style="width:100%; margin-top:5px; padding:8px; border:1px solid #cbd5e1; border-radius:6px;">
                </div>
            </div>
            <button onclick="runAnalysis()" style="width:100%; padding:12px; background:var(--primary-navy); color:white; border:none; border-radius:8px; font-weight:600; cursor:pointer;">Analyze & Sync AI</button>
        </div>

        <div class="card">
            <div class="section-title">Project S-Curve</div>
            <div style="height:300px;"><canvas id="chart"></canvas></div>
        </div>
    </div>

    <div class="right-content">
        <div class="card chat-container">
            <div class="section-title">CM AI Assistant</div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">안녕하세요, 윤해인 님. 건설 현장 공정 관리 및 계약 자문을 돕는 AI 비서입니다. 궁금한 점을 물어보세요!</div>
            </div>
            <div class="chat-input-group">
                <input type="text" id="chatInput" class="chat-input" placeholder="질문을 입력하세요..." onkeypress="if(event.keyCode==13) sendMessage()">
                <button class="btn-send" onclick="sendMessage()">➤</button>
            </div>
        </div>

        <div class="card">
            <div class="section-title">Performance Metrics</div>
            <table class="metric-table">
                <tr><td>SPI (Schedule)</td><td id="spi" style="text-align:right; font-weight:700;">-</td></tr>
                <tr><td>CPI (Cost)</td><td id="cpi" style="text-align:right; font-weight:700;">-</td></tr>
                <tr><td>EAC (Estimate)</td><td id="eac" style="text-align:right; font-weight:700; color:var(--accent-blue);">-</td></tr>
            </table>
        </div>
    </div>
</div>

<script>
    let myChart;

    // 실시간 날씨
    async function fetchWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&current_weather=true');
            const data = await res.json();
            document.getElementById('temp').innerText = `${data.current_weather.temperature}°C`;
            document.getElementById('cond').innerText = data.current_weather.weathercode >= 51 ? "Rain" : "Clear";
            document.getElementById('work').innerText = data.current_weather.weathercode >= 51 ? "Restricted" : "Good";
        } catch(e) { console.error("Weather load fail"); }
    }

    // AI 챗봇 메시지 전송 로직
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = '';

        // 로딩 표시 후 답변 (시연용 규칙 기반 AI)
        setTimeout(() => {
            const response = generateAIResponse(text);
            addMessage(response, 'bot');
        }, 600);
    }

    function addMessage(text, sender) {
        const container = document.getElementById('chatMessages');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }

    // 시연용 AI 응답 로직 (실제 API 연동 시 이 부분을 fetch 코드로 교체)
    function generateAIResponse(query) {
        if (query.includes('SPI')) return "SPI($Schedule\ Performance\ Index$)는 계획 대비 달성률을 의미합니다. 1.0 미만이면 공정 지연 상태이므로 자원 투입을 늘려야 합니다.";
        if (query.includes('날씨')) return "현재 현장 날씨 정보에 따르면 " + document.getElementById('temp').innerText + "이며 공사 수행 환경은 " + document.getElementById('work').innerText + " 상태입니다.";
        if (query.includes('FIDIC')) return "FIDIC Silver Book 기준, Employer's Representative는 시공자에게 지시를 내릴 권한이 있으며, 공기 연장(EOT)은 Clause 8.4에 따라 청구할 수 있습니다.";
        if (query.includes('지연')) return "공정 지연이 발생했다면 Critical Path를 우선 분석하세요. 돌발 공사(Crashing)나 병행 시공(Fast Tracking) 검토가 필요합니다.";
        
        return "건설 공정 및 성과 관리와 관련하여 더 구체적인 질문을 해주시면 답변해 드리겠습니다. (예: SPI가 뭐야?, 오늘 날씨 어때?, FIDIC 규정 등)";
    }

    // 차트 및 분석 (이전 코드와 동일)
    function init() {
        const ctx = document.getElementById('chart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1Q', '2Q', '3Q', '4Q'],
                datasets: [
                    { label: 'PV', data: [25, 50, 75, 100], borderColor: '#cbd5e1', borderDash: [5, 5], fill: false },
                    { label: 'EV', data: [20, 42, null, null], borderColor: '#2e7d32', fill: false, borderWidth: 3 },
                    { label: 'AC', data: [28, 48, null, null], borderColor: '#c62828', fill: false, borderWidth: 3 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function runAnalysis() {
        // 샘플 분석 결과 수치화
        document.getElementById('spi').innerText = "0.84";
        document.getElementById('cpi').innerText = "0.88";
        document.getElementById('eac').innerText = "113.6";
        addMessage("분석이 완료되었습니다. 현재 SPI가 0.84로 공정이 16% 지연되고 있습니다. 세부 조치 사항을 물어보세요.", "bot");
    }

    window.onload = () => { fetchWeather(); init(); };
</script>

</body>
</html>
