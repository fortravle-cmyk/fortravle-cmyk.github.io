<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construction Management Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --primary-navy: #1a237e;
            --accent-blue: #3949ab;
            --success-green: #2e7d32;
            --warning-orange: #f57c00;
            --danger-red: #c62828;
            --light-bg: #fdfdfd;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
            --border-light: #eceff1;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #2c3e50;
        }

        .header-banner {
            width: 100%;
            display: block;
        }

        .main-container {
            max-width: 1100px;
            margin: -60px auto 60px;
            padding: 0 20px;
            position: relative;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
            border: 1px solid var(--border-light);
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .title-label {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-navy);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .title-label::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent-blue);
            margin-right: 12px;
            border-radius: 2px;
        }

        /* 컨트롤 영역 */
        .input-box {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-row {
            display: flex;
            gap: 15px;
        }

        .field {
            flex: 1;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
        }

        .btn-action {
            background: var(--primary-navy);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            background: var(--accent-blue);
        }

        /* 분석 테이블 */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        th {
            background: #f1f5f9;
            padding: 15px;
            text-align: left;
            font-size: 0.85rem;
            color: #475569;
            border-bottom: 2px solid var(--border-light);
        }

        td {
            padding: 20px 15px;
            border-bottom: 1px solid var(--border-light);
        }

        .status-pill {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* 알림 메시지 영역 */
        .advice-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #cbd5e1;
            background: #f8fafc;
        }

        .advice-title {
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .advice-text {
            font-size: 0.95rem;
            color: #475569;
        }

        .chart-wrap {
            height: 350px;
        }

        @media (max-width: 850px) {
            .grid-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<img src="https://capsule-render.vercel.app/api?type=waving&color=1a237e&height=280&section=header&text=Construction%20Management%20Dashboard&fontSize=50&fontColor=ffffff&animation=fadeIn" class="header-banner">

<div class="main-container">
    <div class="grid-layout">
        <div class="card">
            <div class="title-label">Project Configuration</div>
            <div class="input-box">
                <div class="field">
                    <label>Upload Schedule Data (CSV)</label>
                    <input type="file" id="csvFile" accept=".csv">
                </div>
                <div class="input-row">
                    <div class="field">
                        <label>Total Budget (BAC, 100M KRW)</label>
                        <input type="number" id="bac" value="100">
                    </div>
                </div>
                <button class="btn-action" onclick="runAnalysis()">Analyze Performance</button>
            </div>
            
            <div id="adviceContainer" class="advice-box">
                <div class="advice-title" id="advTitle">시스템 준비 완료</div>
                <div class="advice-text" id="advText">공정표 파일을 업로드하거나 분석 버튼을 눌러 프로젝트 상태를 진단하세요.</div>
            </div>
        </div>

        <div class="card">
            <div class="title-label">Performance Metrics</div>
            <table>
                <thead>
                    <tr>
                        <th>Metric</th>
                        <th>Value</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Schedule (SPI)</td>
                        <td id="spiVal" style="font-weight: 700;">-</td>
                        <td><span id="spiBadge" class="status-pill">Wait</span></td>
                    </tr>
                    <tr>
                        <td>Cost (CPI)</td>
                        <td id="cpiVal" style="font-weight: 700;">-</td>
                        <td><span id="cpiBadge" class="status-pill">Wait</span></td>
                    </tr>
                </tbody>
            </table>
            <div style="margin-top: 25px; font-size: 0.9rem;">
                <strong>Estimate at Completion (EAC):</strong> <span id="eacVal" style="color: var(--accent-blue); font-weight: 700;">-</span> 억원
            </div>
        </div>
    </div>

    <div class="card">
        <div class="title-label">Project S-Curve Analysis</div>
        <div class="chart-wrap">
            <canvas id="sCurve"></canvas>
        </div>
    </div>
</div>

<script>
    let chartObj;

    function init() {
        const ctx = document.getElementById('sCurve').getContext('2d');
        chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Start', '25%', '50%', '75%', 'Finish'],
                datasets: [
                    { label: 'Planned (PV)', data: [0, 25, 50, 75, 100], borderColor: '#94a3b8', borderDash: [5, 5], fill: false },
                    { label: 'Earned (EV)', data: [0, 20, 42, null, null], borderColor: '#2e7d32', borderWidth: 3, fill: false },
                    { label: 'Actual (AC)', data: [0, 28, 48, null, null], borderColor: '#c62828', borderWidth: 3, fill: false }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }

    function runAnalysis() {
        const file = document.getElementById('csvFile').files[0];
        const bac = parseFloat(document.getElementById('bac').value);

        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const rows = e.target.result.split('\n').slice(1);
                const labels = [], pv = [], ev = [], ac = [];
                rows.forEach(row => {
                    const cols = row.split(',');
                    if (cols.length >= 4) {
                        labels.push(cols[0]);
                        pv.push(parseFloat(cols[1]));
                        ev.push(parseFloat(cols[2]));
                        ac.push(parseFloat(cols[3]));
                    }
                });
                updateUI(labels, pv, ev, ac, bac);
            };
            reader.readAsText(file);
        } else {
            // Default Sample Data
            updateUI(['1Q', '2Q', '3Q', '4Q'], [25, 50, 75, 100], [20, 42, null, null], [28, 48, null, null], bac);
        }
    }

    function updateUI(labels, pv, ev, ac, bac) {
        chartObj.data.labels = labels;
        chartObj.data.datasets[0].data = pv;
        chartObj.data.datasets[1].data = ev;
        chartObj.data.datasets[2].data = ac;
        chartObj.update();

        const lastIdx = ev.filter(v => v !== null).length - 1;
        const s = ev[lastIdx] / pv[lastIdx];
        const c = ev[lastIdx] / ac[lastIdx];

        document.getElementById('spiVal').innerText = s.toFixed(2);
        document.getElementById('cpiVal').innerText = c.toFixed(2);
        document.getElementById('eacVal').innerText = (bac / c).toFixed(1);

        applyStatus('spiBadge', s);
        applyStatus('cpiBadge', c);
        generateAdvice(s, c);
    }

    function applyStatus(id, val) {
        const el = document.getElementById(id);
        if (val >= 1.0) {
            el.innerText = "Excellent";
            el.style.background = "#e8f5e9";
            el.style.color = "#2e7d32";
        } else if (val >= 0.85) {
            el.innerText = "Caution";
            el.style.background = "#fff3e0";
            el.style.color = "#ef6c00";
        } else {
            el.innerText = "Critical";
            el.style.background = "#ffebee";
            el.style.color = "#c62828";
        }
    }

    function generateAdvice(spi, cpi) {
        const box = document.getElementById('adviceContainer');
        const title = document.getElementById('advTitle');
        const text = document.getElementById('advText');

        if (spi < 1.0 && cpi < 1.0) {
            box.style.borderColor = "var(--danger-red)";
            title.innerText = "⚠️ 긴급 관리 필요 (Critical Status)";
            text.innerText = "일정 지연과 비용 초과가 동시에 발생하고 있습니다. 주공정(Critical Path)을 재점검하고, 불필요한 현장 낭비 요소를 즉시 차단하세요. 필요시 자원 투입 계획을 전면 수정해야 합니다.";
        } else if (spi < 1.0) {
            box.style.borderColor = "var(--warning-orange)";
            title.innerText = "📅 일정 회복 집중 (Schedule Recovery)";
            text.innerText = "원가 효율은 양호하나 일정이 늦어지고 있습니다. 돌발 공사(Crashing)나 병행 시공(Fast Tracking)을 검토하여 기준 종료일을 준수할 수 있도록 조치하세요.";
        } else if (cpi < 1.0) {
            box.style.borderColor = "var(--warning-orange)";
            title.innerText = "💰 원가 절감 대책 (Cost Control)";
            text.innerText = "일정은 빠르나 예산이 과다 투입되고 있습니다. 노무비 효율과 자재 손실률을 점검하세요. 현재 추세라면 완료 시점 예산(EAC)이 원래 계획을 크게 상회할 위험이 있습니다.";
        } else {
            box.style.borderColor = "var(--success-green)";
            title.innerText = "✅ 프로젝트 정상 진행 (Good Progress)";
            text.innerText = "현재 모든 지표가 안정적입니다. 지금의 생산성을 유지하면서 향후 발생 가능한 리스크(날씨, 자재 수급 등)에 대비한 예방적 관리에 집중하세요.";
        }
    }

    window.onload = init;
</script>

</body>
</html>
